<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 검사</title>
    <link rel="stylesheet" href="MBTI.css" />
</head>

<body>
    <h1 id="title">MBTI 검사</h1>

    <div id="start-screen">
        <h2>나만의 성향 알아보기</h2>
        <p>총 20개의 문항으로 구성되어 있습니다.<br>평소 자신의 모습에 가장 가까운 답변을 선택해 주세요.</p>
        <button class="primary-btn" onclick="startTest()">검사 시작하기</button>
    </div>

    <div id="test-screen">
        <div id="progress-container">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <p id="progress-text">0 / 20</p>
        </div>
        <div id="questions-container"></div>

        <button id="next-btn" class="primary-btn" onclick="nextPage()">다음</button>
    </div>

    <div id="result-box"></div>

    <script src="MBTI.js"></script>
</body>

</html>
